<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RW Ar Condicionado | Atendimento Rápido</title>
    <style>
        :root { 
            --azul-escuro: #002d72; /* Azul Marinho Profissional */
            --azul-claro: #0056b3; 
            --verde-zap: #25d366; 
            --cinza-bg: #f8f9fa;
        }
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; padding: 0; color: #333; background-color: var(--cinza-bg); }
        .container { max-width: 450px; margin: 0 auto; padding: 20px; text-align: center; }
        
        header { background: var(--azul-escuro); color: white; padding: 40px 20px; border-radius: 0 0 30px 30px; }
        h1 { margin: 0; font-size: 1.8rem; letter-spacing: -1px; }
        
        .cta-box { background: #fff; padding: 25px; margin-top: -20px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        select { width: 100%; padding: 15px; margin: 15px 0; border: 2px solid #e9ecef; border-radius: 10px; font-size: 1.1rem; background-color: #fff; }
        
        .btn-zap { background: var(--verde-zap); color: white; border: none; padding: 18px; width: 100%; border-radius: 10px; font-weight: 800; font-size: 1.1rem; cursor: pointer; transition: transform 0.2s; }
        .btn-zap:active { transform: scale(0.98); }
        
        .fotos-info { margin-top: 30px; font-size: 0.85rem; color: #666; font-style: italic; }
    </style>
</head>
<body>

<header>
    <h1>RW Ar Condicionado</h1>
    <p>Excelência Técnica e Atendimento Ágil</p>
</header>

<div class="container">
    <div class="cta-box">
        <h3>Como podemos ajudar?</h3>
        <select id="servico">
            <option value="Instalação">Instalação de Split</option>
            <option value="Limpeza">Limpeza e Higienização</option>
            <option value="Manutenção">Conserto e Manutenção</option>
        </select>
        <button class="btn-zap" onclick="iniciarAtendimento()">Solicitar Orçamento Agora</button>
    </div>

    <div class="fotos-info">
        <p>Ao clicar, você será direcionado ao nosso WhatsApp oficial para um atendimento personalizado.</p>
    </div>
</div>

<script>
    function iniciarAtendimento() {
        const servico = document.getElementById('servico').value;
        const numero = "55SEUNUMERO"; // <--- COLOQUE SEU NÚMERO AQUI
        const mensagem = `Olá, gostaria de um orçamento para: ${servico}. Vi no site de vocês.`;
        window.location.href = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;
    }
</script>

</body>
</html>
