<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RW Ar Condicionado | Orçamento Online</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; }
        .container { max-width: 450px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { color: #0a2540; text-align: center; font-size: 1.5rem; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 0.9rem; color: #444; }
        input, select { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 25px; background: #25d366; color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        button:hover { background: #128c7e; }
    </style>
</head>
<body>

<div class="container">
    <h1>RW Ar Condicionado</h1>
    <p style="text-align: center; color: #666; font-size: 0.9rem;">Preencha os dados abaixo e receba seu orçamento rápido:</p>

    <label>Serviço Desejado:</label>
    <select id="servico">
        <option value="Instalação">Instalação</option>
        <option value="Limpeza">Limpeza / Higienização</option>
        <option value="Conserto">Conserto / Manutenção</option>
    </select>

    <label>Capacidade (BTUs):</label>
    <input type="text" id="btu" placeholder="Ex: 9.000, 12.000, etc">

    <label>Local (Alvenaria ou Gesso):</label>
    <input type="text" id="local" placeholder="Ex: Parede de alvenaria">

    <label>Cidade / Bairro:</label>
    <input type="text" id="bairro" placeholder="Ex: Centro, Bairro Sul">

    <button onclick="enviarWhatsApp()">SOLICITAR ORÇAMENTO</button>
</div>

<script>
    function enviarWhatsApp() {
        const servico = document.getElementById('servico').value;
        const btu = document.getElementById('btu').value;
        const local = document.getElementById('local').value;
        const bairro = document.getElementById('bairro').value;
        
        const numero = "55SEUNUMERO"; // Substitua pelo número (DDD+Número)
        
        const mensagem = `Olá! Gostaria de um orçamento para:
        - Serviço: ${servico}
        - Capacidade: ${btu}
        - Local: ${local}
        - Bairro: ${bairro}`;

        window.location.href = `https://wa.me/${numero}?text=${encodeURIComponent(mensagem)}`;
    }
</script>

</body>
</html>
