<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RW Ar Condicionado | Soluções Rápidas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #0072ff; --success: #25d366; --dark: #1e293b; --light: #f8fafc; --ig: #e1306c; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { background-color: var(--light); color: var(--dark); line-height: 1.6; }
        .container { max-width: 1000px; margin: 40px auto; padding: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 40px; align-items: start; }

        /* Estilização da Empresa */
        .about-box { background: white; padding: 30px; border-radius: 15px; border: 1px solid #e2e8f0; }
        .about-box h2 { color: var(--primary); margin-bottom: 20px; }
        .social-icons { margin-top: 25px; display: flex; gap: 15px; }
        .social-icons a { font-size: 2rem; text-decoration: none; transition: transform 0.2s; }
        .fa-whatsapp { color: var(--success); }
        .fa-instagram { color: var(--ig); }
        .social-icons a:hover { transform: scale(1.1); }

        /* Formulário Melhorado */
        .form-card { background: white; padding: 30px; border-radius: 15px; border: 1px solid #e2e8f0; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border-top: 4px solid var(--primary); }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; }
        .btn-submit { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 8px; font-weight: 700; cursor: pointer; transition: background 0.3s; }
        .btn-submit:hover { background: var(--dark); }

        @media (max-width: 768px) { .container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div class="container">
        <div class="about-box">
            <h2>RW Ar Condicionado</h2>
            <p>Resolvemos seu problema com <b>velocidade, responsabilidade e preço justo</b>. Atendimento técnico ágil, orçamentos sem enrolação e foco total na qualidade do seu conforto térmico.</p>
            
            <div class="social-icons">
                <a href="https://wa.me/5511990206951" target="_blank"><i class="fab fa-whatsapp"></i></a>
                <a href="https://instagram.com/rw.arcondicionadoclima" target="_blank"><i class="fab fa-instagram"></i></a>
            </div>
        </div>

        <div class="form-card">
            <h3><i class="fa-solid fa-calendar-check" style="color: var(--primary);"></i> Agende sua Visita</h3>
            <p style="font-size: 0.85rem; color: #64748b; margin-bottom: 20px;">Taxa de visita abatida no valor do serviço aprovado.</p>
            <form action="https://formsubmit.co/SEU_EMAIL_AQUI" method="POST">
                <input type="text" name="nome" placeholder="Seu Nome Completo" required>
                <input type="text" name="cep" placeholder="CEP (00000-000)" pattern="\d{5}-?\d{3}" required>
                <input type="tel" name="whatsapp" placeholder="Seu WhatsApp com DDD" required>
                <select id="servico" name="servico" onchange="atualizarFormulario()">
                    <option value="">Selecione o serviço</option>
                    <option value="instalacao">Instalação</option>
                    <option value="limpeza">Limpeza / Higienização</option>
                    <option value="conserto">Conserto / Manutenção</option>
                </select>
                <div id="camposExtras"></div>
                <input type="text" name="problema" placeholder="Descreva o problema (ex: barulho, não gela)" required>
                <select name="altura">
                    <option value="">Altura do local (acesso)</option>
                    <option value="Terreo">Térreo</option>
                    <option value="2andar">2º Andar</option>
                    <option value="Escada">Andar superior (precisa de escada)</option>
                </select>
                <button type="submit" class="btn-submit">Enviar Pedido de Orçamento</button>
            </form>
        </div>
    </div>

    <script>
        function atualizarFormulario() {
            const servico = document.getElementById('servico').value;
            const camposExtras = document.getElementById('camposExtras');
            camposExtras.innerHTML = servico === 'instalacao' ? 
                '<input type="text" name="maquina" placeholder="Já possui a máquina? (Sim/Não)" required>' : '';
        }
    </script>

    <!-- Script do Botpress mantido -->
    <script src="https://cdn.botpress.cloud/desk/webchat/v4.1/inject.js"></script>
    <script src="https://files.bpcontent.cloud/2026/07/15/14/20260715145034-U9DFR84J.js" defer></script>

</body>
</html>
