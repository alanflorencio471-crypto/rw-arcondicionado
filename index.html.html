<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>RW Ar Condicionado</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; margin: 0; padding: 0; }
        .hero { background: #0a2540; color: white; padding: 60px 20px; text-align: center; }
        .hero h1 { margin: 0; font-size: 2rem; }
        .hero p { opacity: 0.8; margin-top: 10px; }
        .card { max-width: 400px; margin: -40px auto 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        select { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 20px; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #25d366; color: white; border: none; border-radius: 6px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
        button:hover { background: #128c7e; }
        .footer { text-align: center; color: #666; font-size: 14px; }
    </style>
</head>
<body>

<div class="hero">
    <h1>RW Ar Condicionado</h1>
    <p>Instalação e Manutenção Especializada</p>
</div>

<div class="card">
    <label>Selecione o serviço:</label>
    <select id="servico">
        <option value="Instalação">Instalação de Ar Condicionado</option>
        <option value="Limpeza">Limpeza e Higienização</option>
        <option value="Conserto">Conserto Técnico</option>
    </select>
    <button onclick="falarNoZap()">SOLICITAR ORÇAMENTO</button>
</div>

<div class="footer">
    <p>Atendimento rápido via WhatsApp</p>
</div>

<script>
    function falarNoZap() {
        const servico = document.getElementById('servico').value;
        const numero = "55SEUNUMERO"; // Substitua pelo número (ex: 5511999998888)
        const texto = `Olá, vi no site de vocês e quero um orçamento para: ${servico}.`;
        window.location.href = `https://wa.me/${numero}?text=${encodeURIComponent(texto)}`;
    }
</script>

</body>
</html>
